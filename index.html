<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BulutTours Havayolları - Koltuk Seçimi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="selection-area">
            <header class="header">
               <img src="https://cdn-icons-png.flaticon.com/512/784/784844.png" alt="uçak ikonu" style="width: 40px; vertical-align: middle;">
                <h1>BulutTours Havayolları</h1>
                <p>Kullanıcı yorumlarına göre dinamik fiyatlandırma! Zevkinize ve bütçenize göre seçin.</p>
            </header>

            <div class="cabin-layout">
                <div class="fuselage">
                    <div class="seating-plan" id="seatingPlan"></div>
                </div>
            </div>
        </div>

        <div class="summary-area">
            <h2>Uçuş Özeti</h2>
            <div id="bookingSummary" class="booking-summary">
                <p>Henüz bir koltuk seçmediniz.</p>
            </div>
            <div class="chair-icon-corner">
                <img src="https://img.icons8.com/ios/100/eeeeee/armchair.png" alt="koltuk ikonu">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
